version: '3.8'

services:
  agent-platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_platform_app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
